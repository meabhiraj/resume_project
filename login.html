<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Resume Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="bg-white shadow-sm relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <a href="index.html" class="text-2xl font-bold blue-accent">Resume</a>
                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                </nav>
                <button class="md:hidden text-gray-700 text-2xl" id="mobile-menu-button">☰</button>
            </div>
            <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-white shadow-lg z-10">
                <nav class="flex flex-col space-y-4 p-4">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-20">
        <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 bg-white p-8 rounded-lg shadow">
            <h1 class="text-3xl font-bold mb-6 text-center">Login</h1>
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block font-semibold mb-2">Email</label>
                    <input id="email" type="email" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-600" placeholder="your@email.com" required>
                </div>
                <div>
                    <label for="password" class="block font-semibold mb-2">Password</label>
                    <input id="password" type="password" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-600" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Login</button>
            </form>
            <p class="text-center text-gray-600 mt-4">Don't have an account? <a href="signup.html" class="text-blue-600 hover:underline">Sign up here</a></p>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    if (email && password) {
                        // Store login session
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userEmail', email);
                        alert(`Welcome ${email}! Login successful.`);
                        // Redirect to dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Please fill in all fields.');
                    }
                });
            }
        });
    </script>
</body>
</html>
