<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Resume - Resume Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <div class="text-2xl font-bold blue-accent">Resume</div>
                <nav class="space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                    <a href="ats.html" class="text-gray-700 hover:text-blue-600 transition">ATS Score</a>
                    <a href="courses.html" class="text-gray-700 hover:text-blue-600 transition">Courses</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-20">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 bg-white p-8 rounded-lg shadow">
            <h1 class="text-3xl font-bold mb-6 text-center">Create Your Resume</h1>
            <div class="mb-6 p-4 bg-blue-50 rounded-lg">
                <h3 class="text-lg font-semibold mb-2">Upload Existing Resume</h3>
                <p class="text-gray-600 mb-4">Upload your resume file to analyze and improve it.</p>
                <div>
                    <label for="resume-upload" class="block font-semibold mb-2">Select Resume File (.txt only)</label>
                    <input id="resume-upload" name="resume-upload" type="file" accept=".txt" class="w-full px-4 py-2 border border-blue-300 rounded-md" />
                    <button type="button" id="ai-improve-btn" class="mt-2 bg-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">AI Improve Resume</button>
                </div>
            </div>

            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-2">Or Create New Resume</h3>
                <p class="text-gray-600 mb-4">Fill in the details below to build your resume from scratch.</p>
            </div>

            <form id="resume-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="name" class="block font-semibold mb-2">Full Name</label>
                        <input id="name" name="name" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label for="email" class="block font-semibold mb-2">Email</label>
                        <input id="email" name="email" type="email" class="w-full px-4 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label for="phone" class="block font-semibold mb-2">Phone</label>
                        <input id="phone" name="phone" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label for="address" class="block font-semibold mb-2">Address</label>
                        <input id="address" name="address" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div class="md:col-span-2">
                        <label for="linkedin" class="block font-semibold mb-2">LinkedIn</label>
                        <input id="linkedin" name="linkedin" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="https://linkedin.com/in/yourprofile">
                    </div>
                </div>
                <div>
                    <label for="summary" class="block font-semibold mb-2">Professional Summary</label>
                    <textarea id="summary" name="summary" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-md"></textarea>
                </div>
                <div>
                    <label class="block font-semibold mb-2">Experience (one per line, format: Job Title @ Company, Years, Description)</label>
                    <textarea id="experience" name="experience" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="Frontend Developer @ Acme Corp, 2019-2023, Built React apps\nWeb Developer @ Beta Solutions, 2017-2019, Built REST APIs"></textarea>
                </div>
                <div>
                    <label class="block font-semibold mb-2">Education (one per line, format: Degree, School, Year)</label>
                    <textarea id="education" name="education" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="B.Sc. Computer Science, NYU, 2017"></textarea>
                </div>
                <div>
                    <label for="skills" class="block font-semibold mb-2">Skills (comma separated)</label>
                    <input id="skills" name="skills" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="JavaScript, React, Node.js, ...">
                </div>
                <div>
                    <label for="ats-keywords" class="block font-semibold mb-2">ATS Keywords (comma separated)</label>
                    <input id="ats-keywords" name="ats-keywords" type="text" class="w-full px-4 py-2 border border-blue-300 rounded-md" placeholder="Enter keywords to check ATS score">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Generate Resume & ATS Score</button>
            </form>
            <div id="resume-output" class="mt-10 hidden">
                <h2 class="text-2xl font-bold mb-4">Your Resume Preview</h2>
                <div id="resume-preview" class="bg-gray-100 p-6 rounded-lg mb-6"></div>
                <div id="ats-score-output" class="bg-blue-50 p-4 rounded-lg text-blue-800 font-semibold text-center"></div>
            </div>
        </div>
    </section>

    <script>
        // Resume form submit (manual entry)
        document.getElementById('resume-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const linkedin = document.getElementById('linkedin').value;
            const summary = document.getElementById('summary').value;
            const experience = document.getElementById('experience').value;
            const education = document.getElementById('education').value;
            const skills = document.getElementById('skills').value.split(',').map(s => s.trim()).filter(Boolean);
            const atsKeywords = document.getElementById('ats-keywords').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

            let html = `<div class='mb-2'><span class='font-bold text-lg'>${name}</span><br>`;
            if(email) html += `<span class='text-gray-600 text-sm'>${email}</span><br>`;
            if(phone) html += `<span class='text-gray-600 text-sm'>${phone}</span><br>`;
            if(address) html += `<span class='text-gray-600 text-sm'>${address}</span><br>`;
            if(linkedin) html += `<span class='text-blue-700 text-xs'><a href='${linkedin}' target='_blank'>${linkedin}</a></span>`;
            html += `</div>`;
            if(summary) html += `<div class='mb-2'><span class='font-semibold'>Summary:</span> ${summary}</div>`;
            if(experience) {
                html += `<div class='mb-2'><span class='font-semibold'>Experience:</span><ul class='list-disc pl-5'>`;
                experience.split('\n').forEach(line => {
                    if(line.trim()) html += `<li>${line}</li>`;
                });
                html += `</ul></div>`;
            }
            if(education) {
                html += `<div class='mb-2'><span class='font-semibold'>Education:</span><ul class='list-disc pl-5'>`;
                education.split('\n').forEach(line => {
                    if(line.trim()) html += `<li>${line}</li>`;
                });
                html += `</ul></div>`;
            }
            if(skills.length) html += `<div class='mb-2'><span class='font-semibold'>Skills:</span> ${skills.map(s => `<span class='inline-block bg-blue-200 text-blue-800 px-2 py-0.5 rounded mr-1 mb-1'>${s}</span>`).join('')}</div>`;

            // ATS Score Calculation
            let atsScore = '';
            if (atsKeywords.length) {
                // Gather all resume text for keyword search
                let resumeText = [name, email, phone, address, linkedin, summary, experience, education, skills.join(' ')].join(' ').toLowerCase();
                let matches = 0;
                atsKeywords.forEach(k => {
                    const regex = new RegExp(`\\b${k}\\b`, 'g');
                    const found = resumeText.match(regex);
                    if (found) matches += found.length;
                });
                const score = Math.min(100, Math.round((matches / atsKeywords.length) * 100));
                atsScore = `Estimated ATS Score: <span class='font-bold'>${score}%</span>`;
            } else {
                atsScore = 'Enter ATS keywords to calculate score.';
            }

            document.getElementById('resume-preview').innerHTML = html;
            document.getElementById('ats-score-output').innerHTML = atsScore;
            document.getElementById('resume-output').classList.remove('hidden');
            document.getElementById('resume-output').scrollIntoView({behavior: 'smooth'});
        });

        // AI Improve Resume functionality
        document.getElementById('ai-improve-btn').addEventListener('click', async function() {
            const fileInput = document.getElementById('resume-upload');
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
                alert('Please select a resume file to improve.');
                return;
            }
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const text = evt.target.result || '';
                try {
                    // Placeholder for AI API call (replace with actual API)
                    const improvedText = await improveResumeWithAI(text);
                    document.getElementById('resume-preview').innerHTML = `<div class='mb-2'><span class='font-bold text-lg'>AI-Improved Resume</span></div><pre class='whitespace-pre-wrap'>${improvedText}</pre>`;
                    document.getElementById('ats-score-output').innerHTML = 'Resume improved with AI suggestions!';
                    document.getElementById('resume-output').classList.remove('hidden');
                    document.getElementById('resume-output').scrollIntoView({behavior: 'smooth'});
                } catch (error) {
                    alert('Error improving resume: ' + error.message);
                }
            };
            reader.readAsText(file);
        });

        // Placeholder AI function (replace with actual API call)
        async function improveResumeWithAI(text) {
            // Example using OpenAI API (you need to add your API key)
            const apiKey = 'YOUR_OPENAI_API_KEY'; // Replace with your key
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [{
                        role: 'user',
                        content: `Improve this resume for better ATS compatibility and professionalism: ${text}`
                    }],
                    max_tokens: 1000
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                return data.choices[0].message.content;
            } else {
                throw new Error('AI improvement failed');
            }
        }
    </script>
</body>
</html>
