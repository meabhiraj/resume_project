<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Resume Builder - Create Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="bg-white shadow-sm relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <a href="index.html" class="flex items-center space-x-2">
                    <img src="images/logo.png" alt="Resume Builder Logo" class="h-8 w-auto">
                    <span class="text-2xl font-bold blue-accent hidden sm:inline">The Resume Builder</span>
                </a>
                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                    <a href="builder.html" class="text-gray-700 hover:text-blue-600 transition">Builder</a>
                    <a href="ats.html" class="text-gray-700 hover:text-blue-600 transition">ATS Score</a>
                    <a href="courses.html" class="text-gray-700 hover:text-blue-600 transition">Courses</a>
                </nav>
                <button class="md:hidden text-gray-700 text-2xl" id="mobile-menu-button"><i class="fas fa-bars"></i></button>
            </div>
            <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-white shadow-lg z-10">
                <nav class="flex flex-col space-y-4 p-4">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">Home</a>
                    <a href="builder.html" class="text-gray-700 hover:text-blue-600 transition">Builder</a>
                    <a href="ats.html" class="text-gray-700 hover:text-blue-600 transition">ATS Score</a>
                    <a href="courses.html" class="text-gray-700 hover:text-blue-600 transition">Courses</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-10 sm:py-20">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 bg-white p-6 sm:p-8 rounded-lg shadow">
            <h1 class="text-3xl font-bold mb-6 text-center">Create Your Resume</h1>


            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-2">Or Create New Resume</h3>
                <p class="text-gray-600 mb-4">Fill in the details below to build your resume from scratch.</p>
            </div>

            <form id="resume-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="name" class="block font-semibold mb-2">Full Name</label>
                        <input id="name" name="name" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label for="email" class="block font-semibold mb-2">Email</label>
                        <input id="email" name="email" type="email" class="w-full px-4 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div>
                        <label for="phone" class="block font-semibold mb-2">Phone</label>
                        <input id="phone" name="phone" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label for="address" class="block font-semibold mb-2">Address</label>
                        <input id="address" name="address" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div class="md:col-span-2">
                        <label for="linkedin" class="block font-semibold mb-2">LinkedIn</label>
                        <input id="linkedin" name="linkedin" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="https://linkedin.com/in/yourprofile">
                    </div>
                </div>
                <div>
                    <label for="summary" class="block font-semibold mb-2">Professional Summary</label>
                    <textarea id="summary" name="summary" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-md"></textarea>
                </div>
                <div>
                    <label class="block font-semibold mb-2">Experience (one per line, format: Job Title @ Company, Years, Description)</label>
                    <textarea id="experience" name="experience" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="Frontend Developer @ Acme Corp, 2019-2023, Built React apps\nWeb Developer @ Beta Solutions, 2017-2019, Built REST APIs"></textarea>
                </div>
                <div>
                    <label class="block font-semibold mb-2">Education (one per line, format: Degree, School, Year)</label>
                    <textarea id="education" name="education" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="B.Sc. Computer Science, NYU, 2017"></textarea>
                </div>
                <div>
                    <label for="skills" class="block font-semibold mb-2">Skills (comma separated)</label>
                    <input id="skills" name="skills" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="JavaScript, React, Node.js, ...">
                </div>
                <div>
                    <label for="ats-keywords" class="block font-semibold mb-2">ATS Keywords (comma separated)</label>
                    <input id="ats-keywords" name="ats-keywords" type="text" class="w-full px-4 py-2 border border-blue-300 rounded-md" placeholder="Enter keywords to check ATS score">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Generate Resume & ATS Score</button>
            </form>
            <div id="resume-output" class="mt-10 hidden">
                <div id="resume-preview" class="bg-gray-100 p-4 sm:p-6 rounded-lg mb-6"></div>
                <div id="ats-score-output" class="bg-blue-50 p-4 rounded-lg text-blue-800 font-semibold text-center"></div>
            </div>
        </div>
    </section>

    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });

        // Resume form submit (manual entry)
        document.getElementById('resume-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const linkedin = document.getElementById('linkedin').value;
            const summary = document.getElementById('summary').value;
            const experience = document.getElementById('experience').value;
            const education = document.getElementById('education').value;
            const skills = document.getElementById('skills').value.split(',').map(s => s.trim()).filter(Boolean);
            const atsKeywords = document.getElementById('ats-keywords').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

            // ATS Score Calculation
            let atsScore = '';
            if (atsKeywords.length) {
                // Gather all resume text for keyword search
                let resumeText = [name, email, phone, address, linkedin, summary, experience, education, skills.join(' ')].join(' ').toLowerCase();
                let matchCount = 0;
                atsKeywords.forEach(k => {
                    if (resumeText.includes(k)) matchCount++;
                });
                const score = Math.round((matchCount / atsKeywords.length) * 100);
                atsScore = `Estimated ATS Score: <span class='font-bold'>${score}%</span>`;
            } else {
                atsScore = 'Enter ATS keywords to calculate score.';
            }

            // Build resume preview HTML
            let resumeHtml = `<div class='bg-white rounded-lg shadow p-4 sm:p-6 text-gray-900' style='max-width:500px;margin:auto;'>`;
            resumeHtml += `<div class='text-2xl font-bold text-blue-800 leading-tight mb-1'>${name}</div>`;
            resumeHtml += `<div class='text-gray-700 text-sm mb-1'>${email}${phone ? ' | ' + phone : ''}</div>`;
            if (address) resumeHtml += `<div class='text-gray-600 text-sm mb-2'>${address}</div>`;
            if (linkedin) resumeHtml += `<div class='text-blue-700 text-sm mb-2'><a href='${linkedin}' target='_blank'>${linkedin}</a></div>`;
            resumeHtml += `<hr class='mb-3'>`;
            if (summary) {
                resumeHtml += `<div class='font-semibold mt-4 mb-1'>Professional Summary</div><div class='mb-2'>${summary}</div>`;
            }
            if (skills.length) {
                resumeHtml += `<div class='font-semibold mt-4 mb-1'>Skills</div><div class='flex flex-wrap gap-2 mb-2'>`;
                skills.forEach(skill => {
                    resumeHtml += `<span class='bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs font-semibold'>${skill}</span>`;
                });
                resumeHtml += `</div>`;
            }
            if (experience) {
                resumeHtml += `<div class='font-semibold mt-4 mb-1'>Experience</div>`;
                experience.split('\n').forEach(line => {
                    if (line.trim()) resumeHtml += `<div class='mb-1'>${line}</div>`;
                });
            }
            if (education) {
                resumeHtml += `<div class='font-semibold mt-4 mb-1'>Education</div>`;
                education.split('\n').forEach(line => {
                    if (line.trim()) resumeHtml += `<div class='mb-1'>${line}</div>`;
                });
            }
            resumeHtml += `</div>`;

            document.getElementById('resume-preview').innerHTML = resumeHtml;
            document.getElementById('ats-score-output').innerHTML = atsScore;
            document.getElementById('resume-output').classList.remove('hidden');
            document.getElementById('resume-output').scrollIntoView({behavior: 'smooth'});
        });

        // AI Improve Resume functionality
        document.getElementById('ai-improve-btn').addEventListener('click', async function() {
            const fileInput = document.getElementById('resume-upload');
            const file = fileInput.files && fileInput.files[0];
            if (!file) {
                alert('Please select a resume file to improve.');
                return;
            }
            // Send file as FormData to backend
            const formData = new FormData();
            formData.append('resume', file);
            try {
                const response = await fetch('http://localhost:4000/api/improve-resume-file', {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Failed to improve resume.');
                }
                const data = await response.json();
                const improvedText = data.improved;
                document.getElementById('resume-preview').innerHTML = renderResumePreview(improvedText);
                document.getElementById('ats-score-output').innerHTML = 'Resume improved with AI suggestions!';
                document.getElementById('resume-output').classList.remove('hidden');
                document.getElementById('resume-output').scrollIntoView({behavior: 'smooth'});
            } catch (error) {
                alert('Error improving resume: ' + error.message);
            }
        });
        // Render resume preview in a professional, modern style
        function renderResumePreview(text) {
            // Remove the AI-Enhanced header and note if present
            let clean = text.replace(/^AI-Enhanced Resume:\n*/i, '').replace(/\*Note:.*$/is, '').trim();
            // Split into lines and try to group into sections
            const lines = clean.split(/\r?\n/).filter(l => l.trim());
            let html = "<div class='bg-white rounded-lg shadow p-4 sm:p-6 text-gray-900' style='max-width:500px;margin:auto;'>";

            // Extract name, email, phone, address (assume first lines)
            let name = '', email = '', phone = '', address = '';
            let idx = 0;
            if (lines.length > 0) { name = lines[idx++]; }
            if (lines.length > idx && lines[idx].includes('@')) {
                // Try to extract email and maybe phone
                let contactLine = lines[idx++];
                let emailMatch = contactLine.match(/[\w.-]+@[\w.-]+/);
                let phoneMatch = contactLine.match(/\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/);
                if (emailMatch) email = emailMatch[0];
                if (phoneMatch) phone = phoneMatch[0];
            }
            if (lines.length > idx && (lines[idx].match(/\d{4}/) || lines[idx].length < 40)) {
                address = lines[idx++];
            }

            // Header
            html += `<div class='mb-2'>`;
            if (name) html += `<div class='text-2xl font-bold text-blue-800 leading-tight'>${name}</div>`;
            if (email || phone) {
                html += `<div class='text-gray-700 text-sm mb-0.5'>`;
                if (email) html += `<a href='mailto:${email}' class='text-blue-700 hover:underline'>${email}</a>`;
                if (email && phone) html += ' | ';
                if (phone) html += `${phone}`;
                html += `</div>`;
            }
            if (address) html += `<div class='text-gray-600 text-sm mb-1'>${address}</div>`;
            html += `</div><hr class='mb-3'>`;

            // Section parsing
            let section = '';
            let buffer = [];
            let flushSection = () => {
                if (!section) return;
                if (section === 'skills') {
                    // Render as tags
                    let skills = buffer.join(' ').split(/[,|]/).map(s => s.trim()).filter(Boolean);
                    html += `<div class='font-semibold mt-4 mb-1'>Skills</div><div class='flex flex-wrap gap-2 mb-2'>`;
                    skills.forEach(skill => {
                        html += `<span class='bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-xs font-semibold'>${skill}</span>`;
                    });
                    html += `</div>`;
                } else if (section === 'education') {
                    html += `<div class='font-semibold mt-4 mb-1'>Education</div>`;
                    buffer.forEach(line => {
                        html += `<div class='mb-1'>${line}</div>`;
                    });
                } else if (section === 'experience') {
                    html += `<div class='font-semibold mt-4 mb-1'>Experience</div>`;
                    let inRole = false;
                    buffer.forEach(line => {
                        // Bold job titles, italic dates, bullets
                        let m = line.match(/^(.*?)(,?\s*@?\s*[^,]+,?\s*)(\d{4}[^,\n]*)?(,?\s*.*)?$/);
                        if (/^[-•]/.test(line.trim())) {
                            if (!inRole) { html += "<ul class='list-disc pl-6 mb-2'>"; inRole = true; }
                            html += `<li>${line.replace(/^[-•]\s*/, '')}</li>`;
                        } else {
                            if (inRole) { html += "</ul>"; inRole = false; }
                            // Try to bold job title, italicize dates
                            let jobMatch = line.match(/^(.*?)\s*,?\s*([\w .&@-]+)?\s*,?\s*(\d{4}[^,\n]*)?/);
                            if (jobMatch && jobMatch[1]) {
                                let job = jobMatch[1].trim();
                                let company = jobMatch[2] ? jobMatch[2].trim() : '';
                                let date = jobMatch[3] ? jobMatch[3].trim() : '';
                                if (job) html += `<div class='font-semibold'>${job}${company ? ', <span class="font-normal">' + company + '</span>' : ''}</div>`;
                                if (date) html += `<div class='italic text-gray-600 text-xs mb-1'>${date}</div>`;
                            } else {
                                html += `<div class='mb-1'>${line}</div>`;
                            }
                        }
                    });
                    if (inRole) html += "</ul>";
                } else if (section === 'professional summary' || section === 'summary') {
                    html += `<div class='font-semibold mt-4 mb-1'>Professional Summary</div>`;
                    buffer.forEach(line => {
                        html += `<div class='mb-1'>${line}</div>`;
                    });
                } else {
                    // Generic section
                    html += `<div class='font-semibold mt-4 mb-1'>${section.charAt(0).toUpperCase() + section.slice(1)}</div>`;
                    buffer.forEach(line => {
                        html += `<div class='mb-1'>${line}</div>`;
                    });
                }
                buffer = [];
                section = '';
            };

            for (; idx < lines.length; idx++) {
                let line = lines[idx];
                let secMatch = line.trim().toLowerCase().match(/^(professional summary|summary|experience|education|skills)[:：]?$/);
                if (secMatch) {
                    flushSection();
                    section = secMatch[1];
                } else {
                    buffer.push(line);
                }
            }
            flushSection();

            html += "</div>";
            return html;
        }

        // The AI improvement is now handled by the backend API.
    </script>

    <!-- Suggest course-related videos after resume creation -->
    <script>
        // Suggest course-related videos after resume creation
        let courseSuggestions = [
            {
                title: "Modern JavaScript From The Beginning",
                url: "https://www.youtube.com/watch?v=ZzaPdXTrSb8",
                desc: "A complete JavaScript course for beginners."
            },
            {
                title: "React JS Crash Course",
                url: "https://www.youtube.com/watch?v=w7ejDZ8SWv8",
                desc: "Learn React fundamentals in one video."
            },
            {
                title: "Python for Beginners - Full Course",
                url: "https://www.youtube.com/watch?v=rfscVS0vtbw",
                desc: "A full Python programming course for absolute beginners."
            },
            {
                title: "Git & GitHub Crash Course For Beginners",
                url: "https://www.youtube.com/watch?v=SWYqp7iY_Tc",
                desc: "Learn version control with Git and GitHub."
            },
            {
                title: "REST API Concepts and Examples",
                url: "https://www.youtube.com/watch?v=Q-BpqyOT3a8",
                desc: "Understand REST APIs with practical examples."
            }
        ];
        let courseHtml = `<div class='mt-8'><div class='font-semibold mb-2 text-lg'>Recommended Course Videos</div><ul class='list-disc pl-6'>`;
        courseSuggestions.forEach(c => {
            courseHtml += `<li class='mb-2'><a href='${c.url}' target='_blank' class='text-blue-700 hover:underline font-semibold'>${c.title}</a><br><span class='text-gray-600 text-sm'>${c.desc}</span></li>`;
        });
        courseHtml += `</ul></div>`;
        document.getElementById('resume-preview').innerHTML += courseHtml;
    </script>
</body>
</html>
